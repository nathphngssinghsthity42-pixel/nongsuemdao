<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>nongsuemdao</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
background:#000;
}

/* ===== BACKGROUND ===== */
#bg-video{
position:fixed;
inset:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-5;
filter:brightness(.75) contrast(1.2);
}

.overlay{
position:fixed;
inset:0;
background:radial-gradient(circle at center, rgba(0,0,0,.2), rgba(0,0,0,.85));
z-index:-4;
backdrop-filter:blur(10px);
}

/* ===== LIGHT FIELD ===== */
.glow{
position:fixed;
width:400px;
height:400px;
border-radius:50%;
pointer-events:none;
transform:translate(-50%,-50%);
background:radial-gradient(circle,
rgba(0,255,255,.25),
rgba(255,255,255,.08),
transparent 70%);
filter:blur(45px);
mix-blend-mode:screen;
z-index:0;
}

/* ===== SCENE ===== */
.scene{
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
perspective:1400px;
}

/* ===== FLOATING WORLD ===== */
.world{
display:flex;
flex-direction:column;
align-items:center;
gap:18px;
transform-style:preserve-3d;
transition:transform .08s linear;
will-change:transform;
}

/* ===== GLASS UI ===== */
.logo{
color:white;
font-size:2.3rem;
font-weight:700;
padding:18px 55px;
border-radius:999px;

background:rgba(255,255,255,.06);
backdrop-filter:blur(50px);

border:1px solid rgba(255,255,255,.2);

box-shadow:
0 40px 100px rgba(0,0,0,.5),
inset 0 0 25px rgba(255,255,255,.06);

transform:translateZ(60px);
}

.card{
width:300px;
padding:18px;
text-align:center;
text-decoration:none;
color:white;
font-size:1.05rem;
border-radius:999px;

background:rgba(255,255,255,.05);
backdrop-filter:blur(45px);

border:1px solid rgba(255,255,255,.18);

transition:.25s ease;
transform:translateZ(40px);
}

.card:hover{
transform:translateZ(80px) scale(1.05);
box-shadow:0 30px 80px rgba(0,255,255,.15);
}

.spotify{
border:none;
border-radius:18px;
transform:translateZ(30px);
}

.footer{
position:fixed;
bottom:15px;
left:50%;
transform:translateX(-50%);
color:white;
font-size:.85rem;
opacity:.7;
}

/* ===== 3D BUBBLES ===== */
.bubble{
position:absolute;
border-radius:50%;
pointer-events:none;

background:radial-gradient(circle at 30% 30%,
rgba(255,255,255,.95),
rgba(255,255,255,.12),
transparent 70%);

backdrop-filter:blur(25px);

box-shadow:
inset 0 0 25px rgba(255,255,255,.25),
0 0 30px rgba(0,255,255,.08);

animation:rise linear infinite;
will-change:transform;
}

@keyframes rise{
from{
transform:translateY(0) translateZ(0) scale(.8);
}
to{
transform:translateY(-140vh) translateZ(300px) scale(1.2);
}
}
</style>
</head>

<body>

<video autoplay muted loop playsinline id="bg-video">
<source src="background.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="glow" id="glow"></div>

<div class="scene">

<div class="world" id="world">

<div class="logo">𝓝𝓸𝓷𝓰𝓢𝓾𝓮𝓶𝓓𝓪𝓸</div>

<a class="card" href="https://www.instagram.com/bixd_13" target="_blank">bixd_13</a>
<a class="card" href="https://www.instagram.com/charli_xcx" target="_blank">charli xcx</a>
<a class="card" href="https://www.instagram.com/babyjolystar" target="_blank">babyjolystar</a>

<iframe class="spotify"
src="https://open.spotify.com/embed/track/3d5NbAerF2MMHw9tdIxiFH?theme=0"
width="320" height="80"></iframe>

<iframe class="spotify"
src="https://open.spotify.com/embed/track/1hsFfy0IZrIfACU4d6k6Ij?theme=0"
width="320" height="80"></iframe>

</div>

</div>

<div class="footer">©2026 NongSuemDao</div>

<script>

const glow = document.getElementById("glow");
const world = document.getElementById("world");

/* ===== SMOOTH CURSOR GLOW ===== */
window.addEventListener("mousemove",(e)=>{
glow.style.left = e.clientX + "px";
glow.style.top = e.clientY + "px";
});

/* ===== ULTRA TILT (VISION PRO STYLE) ===== */
window.addEventListener("mousemove",(e)=>{

const x = (e.clientX / window.innerWidth - 0.5) * 18;
const y = (e.clientY / window.innerHeight - 0.5) * -18;

world.style.transform = `
rotateY(${x}deg)
rotateX(${y}deg)
translateZ(0px)
`;
});

/* ===== 3D BUBBLES (DEPTH SYSTEM) ===== */
function createBubble(){

if(document.querySelectorAll('.bubble').length > 28) return;

const b = document.createElement("div");
b.classList.add("bubble");

const size = Math.random()*100 + 20;

b.style.width = size + "px";
b.style.height = size + "px";

b.style.left = Math.random()*100 + "vw";

const depth = Math.random();

b.style.opacity = 0.15 + depth * 0.7;
b.style.transform = `scale(${0.4 + depth})`;

b.style.animationDuration = (6 + Math.random()*12) + "s";

document.body.appendChild(b);

setTimeout(()=>b.remove(),22000);
}

setInterval(createBubble,650);

</script>

</body>
</html>
