<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>nongsuemdao</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
}

body{
display:flex;
justify-content:center;
align-items:center;
background:#000;
}

/* BACKGROUND VIDEO */
#bg-video{
position:fixed;
inset:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-3;
}

.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.2);
backdrop-filter:blur(12px);
z-index:-2;
}

/* CURSOR GLOW */
.glow{
position:fixed;
width:320px;
height:320px;
border-radius:50%;
pointer-events:none;
transform:translate(-50%,-50%);
background:radial-gradient(circle,
rgba(0,255,255,.25),
rgba(255,255,255,.1),
transparent 70%);
filter:blur(40px);
z-index:0;
}

/* CONTAINER */
.container{
position:relative;
z-index:10;
display:flex;
flex-direction:column;
align-items:center;
gap:18px;
}

/* LOGO */
.logo{
color:white;
font-size:2.3rem;
font-weight:700;
padding:18px 55px;
border-radius:999px;

background:rgba(255,255,255,.06);
backdrop-filter:blur(35px);

border:1px solid rgba(255,255,255,.18);

box-shadow:
0 10px 40px rgba(255,255,255,.05),
inset 0 0 20px rgba(255,255,255,.03);

animation:float 5s ease-in-out infinite;
}

/* CARD */
.card{
width:290px;
padding:18px;
text-align:center;
text-decoration:none;
color:white;
font-size:1.05rem;
border-radius:999px;

background:rgba(255,255,255,.06);
backdrop-filter:blur(35px);

border:1px solid rgba(255,255,255,.18);

transition:.25s ease;
}

.card:hover{
transform:translateY(-6px) scale(1.05);
box-shadow:0 15px 40px rgba(0,255,255,.15);
}

/* SPOTIFY */
.spotify{
border:none;
border-radius:20px;
}

/* FOOTER */
.footer{
position:fixed;
bottom:15px;
left:50%;
transform:translateX(-50%);
color:white;
font-size:.85rem;
opacity:.7;
}

/* FLOAT */
@keyframes float{
50%{transform:translateY(-10px);}
}

/* ===== NON-CLICK BUBBLES ===== */
.bubble{
position:absolute;
bottom:-120px;
border-radius:50%;

/* ❌ no pointer interaction */
pointer-events:none;

background:radial-gradient(circle at 30% 30%,
rgba(255,255,255,.8),
rgba(255,255,255,.15),
transparent);

backdrop-filter:blur(25px);

box-shadow:inset 0 0 25px rgba(255,255,255,.2);

animation:floatBubble linear infinite;
}

@keyframes floatBubble{
from{transform:translateY(0);}
to{transform:translateY(-130vh);}
}

</style>
</head>

<body>

<video autoplay muted loop playsinline id="bg-video">
<source src="background.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="glow" id="glow"></div>

<div class="container">

<div class="logo">𝓝𝓸𝓷𝓰𝓢𝓾𝓮𝓶𝓓𝓪𝓸</div>

<a class="card" href="https://www.instagram.com/bixd_13" target="_blank">bixd_13</a>
<a class="card" href="https://www.instagram.com/charli_xcx" target="_blank">charli xcx</a>
<a class="card" href="https://www.instagram.com/babyjolystar" target="_blank">babyjolystar</a>

<iframe class="spotify"
src="https://open.spotify.com/embed/track/3d5NbAerF2MMHw9tdIxiFH?theme=0"
width="320" height="80"></iframe>

<iframe class="spotify"
src="https://open.spotify.com/embed/track/1hsFfy0IZrIfACU4d6k6Ij?theme=0"
width="320" height="80"></iframe>

</div>

<div class="footer">©2026 NongSuemDao</div>

<script>

/* cursor glow */
const glow = document.getElementById("glow");

window.addEventListener("mousemove",(e)=>{
glow.style.left = e.clientX + "px";
glow.style.top = e.clientY + "px";
});

/* NON-CLICK BUBBLES ONLY VISUAL */
function createBubble(){

const bubble=document.createElement("div");
bubble.classList.add("bubble");

const size=Math.random()*80+30;

bubble.style.width=size+"px";
bubble.style.height=size+"px";

bubble.style.left=Math.random()*100+"vw";

bubble.style.animationDuration=(Math.random()*10+10)+"s";

document.body.appendChild(bubble);

/* ไม่มี click event แล้ว */
setTimeout(()=>bubble.remove(),20000);
}

setInterval(createBubble,700);

</script>

</body>
</html>
