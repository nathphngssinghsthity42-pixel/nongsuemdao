<style>

*{

margin:0;

padding:0;

box-sizing:border-box;

font-family:Poppins,sans-serif;

}

html,
body{

width:100%;

min-height:100%;

overflow-x:hidden;

background:transparent;

}

body{

min-height:100dvh;

display:flex;

justify-content:center;

align-items:flex-start;

padding:20px;

position:relative;

}

/* วิดีโอพื้นหลัง */

.background-video{

position:fixed;

top:0;

left:0;

width:100vw;

height:100dvh;

object-fit:cover;

z-index:-10;

}

body::before{

content:"";

position:fixed;

inset:0;

background:transparent;

z-index:-20;

}

/* overlay */

.overlay{

position:fixed;

inset:0;

background:

rgba(0,0,0,.18);

z-index:-5;

}

/* card */

.card{

position:relative;

width:100%;

max-width:680px;

padding:28px;

margin-bottom:30px;

overflow:hidden;

border-radius:36px;

background:

rgba(255,255,255,.06);

border:

1px solid rgba(255,255,255,.18);

}

/* video card */

.card-video{

position:absolute;

inset:0;

width:100%;

height:100%;

object-fit:cover;

opacity:.95;

z-index:-1;

}

/* top */

.top{

display:flex;

justify-content:flex-end;

gap:10px;

}

.top a{

text-decoration:none;

color:white;

padding:12px 18px;

font-size:16px;

font-weight:700;

border-radius:18px;

background:

rgba(255,255,255,.12);

}

/* profile */

.profile{

width:120px;

height:120px;

display:block;

margin:

20px auto;

border-radius:50%;

object-fit:cover;

border:

3px solid rgba(255,255,255,.3);

}

/* text */

.title{

text-align:center;

color:white;

font-weight:800;

font-size:

clamp(
20px,
5vw,
40px
);

white-space:nowrap;

overflow:hidden;

text-overflow:ellipsis;

}

.subtitle{

text-align:center;

color:white;

margin-top:8px;

font-size:16px;

}

.bio{

text-align:center;

color:white;

margin-top:10px;

font-size:13px;

}

/* social */

.social{

display:flex;

justify-content:center;

gap:14px;

margin-top:26px;

}

.social a{

width:64px;

height:64px;

display:flex;

align-items:center;

justify-content:center;

text-decoration:none;

font-size:28px;

color:white;

border-radius:20px;

background:

rgba(255,255,255,.12);

}

/* links */

.links{

display:flex;

flex-direction:column;

gap:14px;

margin-top:28px;

}

.links a{

display:flex;

align-items:center;

justify-content:center;

gap:12px;

padding:18px;

color:white;

font-size:16px;

font-weight:700;

white-space:nowrap;

text-decoration:none;

border-radius:22px;

background:

rgba(255,255,255,.12);

}

.kahoot{

background:

linear-gradient(
135deg,
#6d2fff,
#b04cff
);

}

.klogo{

width:30px;

height:30px;

}

.footer{

margin-top:20px;

text-align:center;

color:white;

font-size:12px;

opacity:.7;

}

@media(max-width:768px){

.card{

padding:22px;

}

.profile{

width:100px;

height:100px;

}

.social a{

width:58px;

height:58px;

}

.links a{

font-size:15px;

}

}

</style>
