<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>𝓝𝓸𝓷𝓰𝓢𝓾𝓮𝓶𝓓𝓪𝓸</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
}

body{
display:flex;
justify-content:center;
align-items:center;
position:relative;
background:black;
}

/* VIDEO BACKGROUND */

#bg-video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
}

.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.35);
backdrop-filter:blur(4px);
z-index:-1;
}

.container{
position:relative;
z-index:10;
display:flex;
flex-direction:column;
align-items:center;
gap:18px;
}

.logo{
color:white;
font-size:2.3rem;
font-weight:700;
padding:18px 55px;
border-radius:999px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(25px);
border:1px solid rgba(255,255,255,.15);
box-shadow:0 0 40px rgba(255,255,255,.15);
animation:float 4s ease-in-out infinite;
}

.card{
width:290px;
padding:18px;
text-align:center;
text-decoration:none;
color:white;
font-size:1.05rem;
border-radius:999px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(25px);
border:1px solid rgba(255,255,255,.15);
transition:.35s;
}

.card:hover{
transform:translateY(-5px) scale(1.05);
box-shadow:0 0 30px rgba(255,255,255,.25);
}

.spotify{
border:none;
border-radius:20px;
}

.footer{
position:fixed;
bottom:15px;
left:50%;
transform:translateX(-50%);
color:white;
font-size:.9rem;
z-index:20;
}

.bubble{
position:absolute;
bottom:-150px;
border-radius:50%;
cursor:pointer;

background:
radial-gradient(circle at 30% 30%,
rgba(255,255,255,.8),
rgba(255,255,255,.1),
transparent);

backdrop-filter:blur(30px);

box-shadow:
inset 0 0 40px rgba(255,255,255,.25),
0 0 25px rgba(255,255,255,.15);

animation:floatBubble linear infinite;
}

@keyframes float{
50%{
transform:translateY(-10px);
}
}

@keyframes floatBubble{
from{
transform:translateY(0);
}
to{
transform:translateY(-130vh);
}
}

</style>
</head>

<body>

<video autoplay muted loop playsinline id="bg-video">
<source src="background.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="container">

<div class="logo">
𝓝𝓸𝓷𝓰𝓢𝓾𝓮𝓶𝓓𝓪𝓸
</div>

<a class="card" href="https://www.instagram.com/bixd_13" target="_blank">
bixd_13
</a>

<a class="card" href="https://www.instagram.com/charli_xcx" target="_blank">
charli xcx
</a>

<a class="card" href="https://www.instagram.com/babyjolystar" target="_blank">
babyjolystar
</a>

<iframe
class="spotify"
src="https://open.spotify.com/embed/track/3d5NbAerF2MMHw9tdIxiFH?utm_source=generator&theme=0"
width="320"
height="80"
allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
</iframe>

<iframe
class="spotify"
src="https://open.spotify.com/embed/track/1hsFfy0IZrIfACU4d6k6Ij?utm_source=generator&theme=0"
width="320"
height="80"
allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
</iframe>

</div>

<div class="footer">
©2026 NongSuemDao
</div>

<script>

function createBubble(){

const bubble=document.createElement("div");

bubble.classList.add("bubble");

const size=Math.random()*90+40;

bubble.style.width=size+"px";
bubble.style.height=size+"px";

bubble.style.left=Math.random()*100+"vw";

bubble.style.animationDuration=
(Math.random()*10+10)+"s";

document.body.appendChild(bubble);

bubble.onclick=()=>{

bubble.animate([
{transform:"scale(1)",opacity:1},
{transform:"scale(1.8)",opacity:0}
],{
duration:500
});

setTimeout(()=>{
bubble.remove();
},450);

};

setTimeout(()=>{
bubble.remove();
},20000);

}

setInterval(createBubble,700);

</script>

</body>
</html>
