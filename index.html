html,body{

}

.overlay{

z-index:-1;
}

/* CONTAINER */
.container{
position:relative;
z-index:10;
display:flex;
flex-direction:column;
align-items:center;
gap:18px;
}

font-weight:700;

}

.card{

text-align:center;
text-decoration:none;

font-size:1.05rem;

background:rgba(255,255,255,.06);

transition:.25s ease;
}

.card:hover{
transform:translateY(-6px) scale(1.05);
box-shadow:0 20px 50px rgba(0,0,0,.25);
}

.spotify{
border:none;
border-radius:18px;
}

.footer{

opacity:.7;
}

/* FLOAT */
@keyframes float{

}
