<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>nongsuemdao</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
}

body{
display:flex;
justify-content:center;
align-items:center;
background:black;
}

/* VIDEO BACKGROUND */
#bg-video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-3;
}

.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.25);
backdrop-filter:blur(8px);
z-index:-2;
}

/* ===== CURSOR GLOW ===== */
.glow{
position:fixed;
width:280px;
height:280px;
border-radius:50%;
pointer-events:none;
transform:translate(-50%,-50%);
background:radial-gradient(circle,
rgba(255,255,255,.35),
rgba(0,255,255,.15),
transparent 70%);
filter:blur(30px);
z-index:0;
}

/* ===== CONTAINER ===== */
.container{
position:relative;
z-index:10;
display:flex;
flex-direction:column;
align-items:center;
gap:18px;
}

/* ===== LOGO (iOS GLASS) ===== */
.logo{
color:white;
font-size:2.3rem;
font-weight:700;
padding:18px 55px;
border-radius:999px;

background:rgba(255,255,255,.08);
backdrop-filter:blur(30px);

border:1px solid rgba(255,255,255,.18);
box-shadow:
0 10px 40px rgba(255,255,255,.08),
inset 0 0 20px rgba(255,255,255,.05);

animation:float 4s ease-in-out infinite;
}

/* ===== CARD (iOS STYLE CLEAN GLASS) ===== */
.card{
width:290px;
padding:18px;
text-align:center;
text-decoration:none;
color:white;
font-size:1.05rem;
border-radius:999px;

background:rgba(255,255,255,.08);
backdrop-filter:blur(28px);

border:1px solid rgba(255,255,255,.18);

transition:0.25s ease;
transform-style:preserve-3d;
}

.card:hover{
transform:translateY(-5px) scale(1.05);
box-shadow:0 15px 40px rgba(255,255,255,.15);
}

/* ===== SPOTIFY ===== */
.spotify{
border:none;
border-radius:20px;
}

/* ===== FOOTER ===== */
.footer{
position:fixed;
bottom:15px;
left:50%;
transform:translateX(-50%);
color:white;
font-size:.9rem;
z-index:20;
opacity:.8;
}

/* ===== BUBBLES ===== */
.bubble{
position:absolute;
bottom:-150px;
border-radius:50%;
cursor:pointer;

background:radial-gradient(circle at 30% 30%,
rgba(255,255,255,.9),
rgba(255,255,255,.1),
transparent);

backdrop-filter:blur(25px);

box-shadow:
inset 0 0 30px rgba(255,255,255,.2);

animation:floatBubble linear infinite;
}

@keyframes float{
50%{transform:translateY(-10px);}
}

@keyframes floatBubble{
from{transform:translateY(0);}
to{transform:translateY(-130vh);}
}

</style>
</head>

<body>

<video autoplay muted loop playsinline id="bg-video">
<source src="background.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<!-- cursor glow -->
<div class="glow" id="glow"></div>

<div class="container">

<div class="logo" id="logo">
𝓝𝓸𝓷𝓰𝓢𝓾𝓮𝓶𝓓𝓪𝓸
</div>

<a class="card" href="https://www.instagram.com/bixd_13" target="_blank">bixd_13</a>
<a class="card" href="https://www.instagram.com/charli_xcx" target="_blank">charli xcx</a>
<a class="card" href="https://www.instagram.com/babyjolystar" target="_blank">babyjolystar</a>

<iframe class="spotify"
src="https://open.spotify.com/embed/track/3d5NbAerF2MMHw9tdIxiFH?theme=0"
width="320" height="80"></iframe>

<iframe class="spotify"
src="https://open.spotify.com/embed/track/1hsFfy0IZrIfACU4d6k6Ij?theme=0"
width="320" height="80"></iframe>

</div>

<div class="footer">©2026 NongSuemDao</div>

<script>

/* ===== CURSOR GLOW ===== */
const glow = document.getElementById("glow");

window.addEventListener("mousemove",(e)=>{
glow.style.left = e.clientX + "px";
glow.style.top = e.clientY + "px";
});

/* ===== 3D TILT (LIGHT) ===== */
const cards = document.querySelectorAll(".card");

cards.forEach(card=>{
card.addEventListener("mousemove",(e)=>{
const rect = card.getBoundingClientRect();

const x = (e.clientX - rect.left)/rect.width - 0.5;
const y = (e.clientY - rect.top)/rect.height - 0.5;

card.style.transform =
`rotateX(${y * -10}deg) rotateY(${x * 10}deg) scale(1.05)`;
});

card.addEventListener("mouseleave",()=>{
card.style.transform = "none";
});
});

/* ===== BUBBLES ===== */
function createBubble(){

const bubble=document.createElement("div");
bubble.classList.add("bubble");

const size=Math.random()*90+40;

bubble.style.width=size+"px";
bubble.style.height=size+"px";

bubble.style.left=Math.random()*100+"vw";

bubble.style.animationDuration=(Math.random()*10+10)+"s";

document.body.appendChild(bubble);

setTimeout(()=>bubble.remove(),20000);
}

setInterval(createBubble,700);

</script>

</body>
</html>
