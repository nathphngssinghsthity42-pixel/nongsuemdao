<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>𝓝𝓸𝓷𝓰𝓢𝓾𝓮𝓶𝓓𝓪𝓸</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
overflow:hidden;
background:url('background.png') center center/cover no-repeat;
display:flex;
justify-content:center;
align-items:center;
position:relative;
}

body::before{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,.45);
backdrop-filter:blur(3px);
}

.container{
position:relative;
z-index:5;
display:flex;
flex-direction:column;
align-items:center;
gap:18px;
}

.logo{
color:white;
font-size:2.2rem;
padding:18px 50px;
border-radius:50px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(25px);
border:1px solid rgba(255,255,255,.15);
box-shadow:0 0 35px rgba(255,255,255,.15);
animation:float 4s ease-in-out infinite;
}

.card{
width:280px;
padding:18px;
text-align:center;
text-decoration:none;
color:white;
font-size:1.1rem;
border-radius:30px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(25px);
border:1px solid rgba(255,255,255,.15);
transition:.35s;
}

.card:hover{
transform:translateY(-5px) scale(1.05);
box-shadow:0 0 30px rgba(255,255,255,.3);
}

.spotify{
margin-top:5px;
border:none;
border-radius:20px;
}

.footer{
position:fixed;
bottom:15px;
left:50%;
transform:translateX(-50%);
color:white;
font-size:.9rem;
z-index:5;
}

.bubble{
position:absolute;
border-radius:50%;
background:
radial-gradient(circle at 30% 30%,
rgba(255,255,255,.8),
rgba(255,255,255,.12),
transparent);

backdrop-filter:blur(25px);

box-shadow:
inset 0 0 40px rgba(255,255,255,.25),
0 0 25px rgba(255,255,255,.12);

animation:floatBubble linear infinite;
cursor:pointer;
}

.cursor{
position:fixed;
width:250px;
height:250px;
border-radius:50%;
pointer-events:none;
background:
radial-gradient(circle,
rgba(255,255,255,.18),
transparent 70%);
transform:translate(-50%,-50%);
z-index:1;
}

@keyframes float{
50%{
transform:translateY(-10px);
}
}

@keyframes floatBubble{
from{
transform:translateY(100vh);
}
to{
transform:translateY(-150px);
}
}
</style>
</head>

<body>

<div class="cursor"></div>

<div class="container">

<div class="logo">
𝓝𝓸𝓷𝓰𝓢𝓾𝓮𝓶𝓓𝓪𝓸
</div>

<a class="card" href="https://www.instagram.com/bixd_13" target="_blank">
bixd_13
</a>

<a class="card" href="https://www.instagram.com/charli_xcx" target="_blank">
charli xcx
</a>

<a class="card" href="https://www.instagram.com/babyjolystar" target="_blank">
babyjolystar
</a>

<iframe
class="spotify"
src="https://open.spotify.com/embed/track/3d5NbAerF2MMHw9tdIxiFH?utm_source=generator&theme=0"
width="320"
height="80"
allowfullscreen=""
allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
</iframe>

</div>

<div class="footer">
©2026 NongSuemDao
</div>

<script>

const cursor=document.querySelector(".cursor");

document.addEventListener("mousemove",(e)=>{
cursor.style.left=e.clientX+"px";
cursor.style.top=e.clientY+"px";
});

function createBubble(){

const bubble=document.createElement("div");

bubble.className="bubble";

const size=Math.random()*90+40;

bubble.style.width=size+"px";
bubble.style.height=size+"px";

bubble.style.left=Math.random()*100+"vw";

bubble.style.animationDuration=
(Math.random()*10+10)+"s";

document.body.appendChild(bubble);

bubble.onclick=()=>{

bubble.animate([
{transform:"scale(1)",opacity:1},
{transform:"scale(1.8)",opacity:0}
],{
duration:500
});

setTimeout(()=>{
bubble.remove();
},450);

};

setTimeout(()=>{
bubble.remove();
},20000);

}

setInterval(createBubble,700);

</script>

</body>
</html>
